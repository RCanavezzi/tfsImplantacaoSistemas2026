version: '3.8'


services:

  nginx-proxy:

    image: nginx:alpine

    container_name: blog-proxy

    ports:

      - "8080:80"

    volumes:

      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

      - nginx-logs:/var/log/nginx

    depends_on:

      - frontend

      - backend

    networks:

      - blog-network

    restart: unless-stopped


  frontend:

    build: ./frontend

    container_name: blog-frontend

    expose:

      - "3000"

    depends_on:

      - backend

    networks:

      - blog-network

    restart: unless-stopped

    healthcheck:

      test: ["CMD", "curl", "-f", "http://localhost:3000"]

      interval: 30s

      timeout: 10s

      retries: 3


  backend:

    build: ./backend

    container_name: blog-backend

    expose:

      - "5000"

    environment:

      - DB_HOST=database

      - DB_USER=bloguser

      - DB_PASSWORD=blogpass

      - DB_NAME=blogdb

    depends_on:

      database:

        condition: service_healthy

    networks:

      - blog-network

    restart: unless-stopped

    healthcheck:

      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]

      interval: 30s

      timeout: 10s

      retries: 3


  database:

    image: mysql:8.0

    container_name: blog-database

    environment:

      - MYSQL_ROOT_PASSWORD=rootpass

      - MYSQL_DATABASE=blogdb

      - MYSQL_USER=bloguser

      - MYSQL_PASSWORD=blogpass

    volumes:

      - blog-data:/var/lib/mysql

      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    networks:

      - blog-network

    restart: unless-stopped

    healthcheck:

      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]

      interval: 10s

      timeout: 5s

      retries: 5


networks:

  blog-network:

    driver: bridge


volumes:

  blog-data:

    driver: local

  nginx-logs:

    driver: local