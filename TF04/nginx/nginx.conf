events {
    worker_connections 1024;
}

http {
    # 1. Configurações Avançadas de Compressão (Gzip)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;

    # 2. Rate Limiting (Proteção contra sobrecarga)
    # Permite 10 requisições por segundo por endereço IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # 3. Formato de Log Avançado (Exigência do Professor)
    # O log vai mostrar qual a instância de backend que atendeu a requisição ($upstream_addr)
    log_format upstream_logging '$remote_addr - $remote_user [$time_local] '
                                '"$request" $status $body_bytes_sent '
                                '"$http_referer" "$http_user_agent" '
                                'upstream: $upstream_addr';

    access_log /var/log/nginx/access.log upstream_logging;

    # 4. O Load Balancer (Upstream)
    upstream backend_servers {
        # Algoritmo exigido: Menor número de conexões ativas
        least_conn;
        
        # Aponta para o serviço "backend" no docker-compose.
        # max_fails e fail_timeout servem como Health Check passivo.
        server backend:5000 max_fails=3 fail_timeout=30s;
    }

    # 5. Servidor HTTP (Redireciona tudo para HTTPS)
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # 6. Servidor HTTPS principal
    server {
        listen 443 ssl;
        server_name localhost;

        # Configuração SSL (Precisas de gerar estes ficheiros)
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # Rota 1: Frontend
        location / {
            proxy_pass http://frontend:3000; # Ajustado para a porta do teu TF03
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Rota 2: Admin Panel
        location /admin/ {
            proxy_pass http://admin:3000/; # Assumindo que o admin corre na 3000 também
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Rota 3: Backend API (Com Load Balancing e Rate Limit)
        location /api/ {
            # Aplica a proteção de requisições
            limit_req zone=api_limit burst=5 nodelay;

            # Encaminha para o grupo de servidores "backend_servers"
            proxy_pass http://backend_servers/api/;
            
            # Cabeçalhos Proxy Exigidos
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Configurações de Timeout
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }

        # Rota 4: Endpoint de Healthcheck Geral
        location /health {
            proxy_pass http://backend_servers/health;
        }

        # Rota 5: Monitorização Nginx (Dashboard Simples de Status)
        location /nginx-status {
            stub_status on;
            allow all; # Em ambiente real, limitar a IPs específicos
        }
    }
}