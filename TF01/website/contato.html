<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeGods - Contato</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>BeGods Barbearia</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="servicos.html">Serviços</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>
    
    <main class="container">
        <section class="card">
            <h2>Agende seu Horário</h2>
            <p>Preencha o formulário abaixo para tirar dúvidas ou solicitar um agendamento. Nossos barbeiros retornarão o contato rapidamente.</p>
            <br>
            <form action="#" method="get">
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" name="nome" required>

                <label for="telefone">WhatsApp / Telefone:</label>
                <input type="text" id="telefone" name="telefone" required>

                <label for="mensagem">Serviço Desejado / Mensagem:</label>
                <textarea id="mensagem" name="mensagem" rows="5" required></textarea>

                <button type="submit">Enviar Mensagem</button>
            </form>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2026 BeGods. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
